<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CEARS | Verify Identity</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background: #0f172a;
        color: white;
        display: flex;
        align-items: center;
        height: 100vh;
        text-align: center;
      }
      .glass-card {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 20px;
        padding: 40px;
        margin: auto;
      }
      .form-control {
        background: rgba(255, 255, 255, 0.1);
        border: none;
        color: white;
        text-align: center;
        font-size: 1.5rem;
        letter-spacing: 5px;
      }
      .form-control:focus {
        background: rgba(255, 255, 255, 0.15);
        color: white;
        box-shadow: none;
        border: 1px solid #38bdf8;
      }
      .btn-primary {
        background: #38bdf8;
        border: none;
        font-weight: bold;
        margin-top: 20px;
        padding: 12px;
      }
      .btn-primary:hover {
        background: #0ea5e9;
      }
    </style>
  </head>
  <body>
    <div class="container col-md-4 glass-card">
      <h2 class="mb-4">Verify Identity</h2>

      <div id="timer-box" class="mb-3">
        Code expires in: <span id="timer" class="text-warning">01:00</span>
      </div>

      <form method="POST" id="otp-form">
        {% csrf_token %}
        <input
          type="text"
          name="otp"
          class="form-control mb-3"
          placeholder="000000"
          maxlength="6"
          required
        />
        <button type="submit" id="submit-btn" class="btn btn-primary w-100">
          Verify OTP
        </button>
      </form>

      <div id="resend-box" style="display: none" class="mt-3">
        <p class="text-muted small">Didn't get the code?</p>
        <button
          type="button"
          onclick="location.reload()"
          class="btn btn-outline-light btn-sm"
        >
          Request New Code
        </button>
      </div>
    </div>

    <script>
      let timeLeft = 60;
      const timerElement = document.getElementById("timer");
      const resendBox = document.getElementById("resend-box");
      const submitBtn = document.getElementById("submit-btn");

      const countdown = setInterval(() => {
        if (timeLeft <= 0) {
          clearInterval(countdown);
          timerElement.innerHTML = "Expired";
          timerElement.classList.replace("text-warning", "text-danger");
          resendBox.style.display = "block";
        } else {
          timeLeft--;
          let minutes = Math.floor(timeLeft / 60);
          let seconds = timeLeft % 60;
          timerElement.innerHTML = `${minutes}:${seconds < 10 ? "0" : ""}${seconds}`;
        }
      }, 1000);
    </script>
  </body>
</html>
