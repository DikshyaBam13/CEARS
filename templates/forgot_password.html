<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Forgot Password - CEARS</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100 flex items-center justify-center h-screen">
    <div class="bg-white p-8 rounded-lg shadow-xl w-96">
      <h2 class="text-2xl font-bold text-center text-red-600 mb-6">
        Reset Password
      </h2>
      <p class="text-gray-600 text-sm mb-4 text-center">
        Enter your email to receive a temporary password.
      </p>

      {% if messages %} {% for m in messages %}
      <div
        class="p-2 mb-4 text-sm rounded {% if m.tags == 'error' %}bg-red-100 text-red-700{% else %}bg-green-100 text-green-700{% endif %}"
      >
        {{ m }}
      </div>
      {% endfor %} {% endif %}

      <form method="POST">
        {% csrf_token %}
        <div class="mb-4">
          <label class="block text-gray-700 text-sm font-bold mb-2"
            >Email Address</label
          >
          <input
            type="email"
            name="email"
            required
            placeholder="example@gmail.com"
            class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-red-500"
          />
        </div>
        <button
          type="submit"
          class="w-full bg-red-600 text-white py-2 rounded hover:bg-red-700 font-bold transition"
        >
          Get Temporary Password
        </button>
      </form>
      <div class="mt-4 text-center">
        <a
          href="{% url 'login' %}"
          class="text-sm text-blue-600 hover:underline"
          >Back to Login</a
        >
      </div>
    </div>
  </body>
</html>
