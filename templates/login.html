<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>CEARS | Login</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background: #0f172a;
        color: white;
        display: flex;
        align-items: center;
        height: 100vh;
      }
      .glass-card {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 20px;
        padding: 40px;
      }
      .form-control {
        background: rgba(255, 255, 255, 0.1);
        border: none;
        color: white;
        padding: 12px;
        margin-bottom: 20px;
      }
      .form-control:focus {
        background: rgba(255, 255, 255, 0.15);
        color: white;
        box-shadow: none;
        border: 1px solid #38bdf8;
      }
      .btn-primary {
        background: #38bdf8;
        border: none;
        font-weight: bold;
        padding: 12px;
      }
      a {
        color: #38bdf8;
        text-decoration: none;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <div class="container col-md-4 glass-card">
      <h2 class="text-center mb-4">Welcome Back</h2>

      {% if messages %} {% for m in messages %}
      <div
        class="text-center small mb-3 p-2 rounded"
        style="{% if 'success' in m.tags %} background: rgba(34, 197, 94, 0.2); color: #4ade80; border: 1px solid rgba(34, 197, 94, 0.3); {% else %} background: rgba(239, 68, 68, 0.2); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.3); {% endif %}"
      >
        {{ m }}
      </div>
      {% endfor %} {% endif %}

      <form method="POST">
        {% csrf_token %}
        <input
          type="text"
          name="username"
          class="form-control"
          placeholder="Username"
          required
        />
        <input
          type="password"
          name="password"
          class="form-control"
          placeholder="Password"
          required
        />

        <button type="submit" class="btn btn-primary w-100">
          Login to Dashboard
        </button>

        <div class="text-end mt-2">
          <a
            href="{% url 'forgot_password' %}"
            style="font-size: 0.8rem; opacity: 0.8"
            >Forgot Password?</a
          >
        </div>
      </form>

      <div class="text-center mt-3">
        <p class="small">
          Don't have an account?
          <a href="{% url 'register' %}">Register here</a>
        </p>
      </div>
    </div>
  </body>
</html>
