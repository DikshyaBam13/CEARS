<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>CEARS | Registration</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background: #0f172a;
        color: white;
        display: flex;
        align-items: center;
        min-height: 100vh;
        padding: 20px 0;
      }
      .glass-card {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 20px;
        padding: 40px;
      }
      .form-control,
      .form-select {
        background: rgba(255, 255, 255, 0.1);
        border: none;
        color: white;
        padding: 12px;
        margin-bottom: 20px;
      }
      .form-control:focus,
      .form-select:focus {
        background: rgba(255, 255, 255, 0.15);
        color: white;
        box-shadow: none;
        border: 1px solid #38bdf8;
      }
      .btn-primary {
        background: #38bdf8;
        border: none;
        font-weight: bold;
        padding: 12px;
      }
      label {
        font-size: 0.9rem;
        color: #94a3b8;
        margin-bottom: 5px;
        display: block;
      }
      option {
        background: #1e293b;
        color: white;
      }
    </style>
  </head>
  <body>
    <div class="container col-md-4 glass-card">
      <h2 class="text-center mb-4">Create Account</h2>
      {% if messages %}{% for m in messages %}
      <p class="text-danger text-center small">{{ m }}</p>
      {% endfor %}{% endif %}

      <form method="POST">
        {% csrf_token %}
        <input
          type="text"
          name="username"
          class="form-control"
          placeholder="Username"
          required
        />
        <input
          type="email"
          name="email"
          class="form-control"
          placeholder="Email Address"
          required
        />

        <label>I am registering as:</label>
        <select
          name="user_type"
          id="userType"
          class="form-select"
          onchange="toggleVolunteerFields()"
          required
        >
          <option value="citizen">Citizen (Help Seeker)</option>
          <option value="volunteer">Volunteer (Emergency Responder)</option>
        </select>

        <div id="volunteerFields" style="display: none">
          <input
            type="text"
            name="org_name"
            class="form-control"
            placeholder="Organization (e.g. Police, Red Cross)"
          />
          <label>Specialization:</label>
          <select name="specialization" class="form-select">
            <option value="Medical">Medical / Ambulance</option>
            <option value="Security">Security / Police</option>
            <option value="Fire">Fire Brigade</option>
            <option value="General">General Help</option>
          </select>
        </div>

        <input
          type="text"
          name="phone"
          class="form-control"
          placeholder="Phone (e.g. +977...)"
          required
        />

        <input
          type="password"
          name="password"
          class="form-control"
          placeholder="Strong Password"
          required
        />

        <button type="submit" class="btn btn-primary w-100">
          Register Account
        </button>
      </form>
    </div>

    <script>
      function toggleVolunteerFields() {
        var type = document.getElementById("userType").value;
        var fields = document.getElementById("volunteerFields");
        if (type === "volunteer") {
          fields.style.display = "block";
        } else {
          fields.style.display = "none";
        }
      }
    </script>
  </body>
</html>
